<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click-হাট Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060b13; color: white; font-family: sans-serif; }
        .cyber-card { background: #0d1423; border: 1px solid #1f2937; position: relative; }
        .offer-tag { background: #e11d48; color: white; padding: 2px 8px; font-size: 10px; font-weight: bold; position: absolute; top: 10px; left: 10px; z-index: 10; border-radius: 4px; }
        .neon-btn { background: linear-gradient(135deg, #6366f1, #a855f7); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-bold">আমাদের এক্সক্লুসিভ কালেকশন</h1>
            <input type="text" id="searchBar" onkeyup="filterProducts()" placeholder="🔍 প্রোডাক্ট সার্চ করুন..." class="w-full md:w-64 p-3 bg-gray-900 border border-gray-700 rounded-lg text-white">
            <button onclick="openAdmin()" class="bg-red-900/50 border border-red-800 text-red-200 px-4 py-2 rounded text-sm">Control Gate 🔐</button>
        </div>

        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

        <div id="admin-panel" class="hidden mt-10 p-6 bg-[#0d1423] border border-indigo-900 rounded-lg">
            <div class="flex justify-between mb-4">
                <h2 class="text-xl font-bold text-indigo-400">⚡ লাইভ ইনভেন্টরি কন্ট্রোল প্যানেল</h2>
                <button onclick="closeAdmin()" class="text-red-400 text-sm">প্যানেল বন্ধ করুন</button>
            </div>
            <form id="product-form" class="space-y-4">
                <input type="text" id="name" placeholder="নাম" class="w-full p-3 bg-black border border-gray-800 rounded" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="price" placeholder="বর্তমান দাম" class="w-full p-3 bg-black border border-gray-800 rounded" required>
                    <input type="number" id="oldPrice" placeholder="আসল দাম (ঐচ্ছিক)" class="w-full p-3 bg-black border border-gray-800 rounded">
                </div>
                <input type="url" id="image" placeholder="ছবির লিঙ্ক" class="w-full p-3 bg-black border border-gray-800 rounded" required>
                <button type="submit" class="w-full p-4 bg-green-600 font-bold rounded">প্রোডাক্ট যোগ করুন 🚀</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://6a0c66445aa893e1015bddd4.mockapi.io/products";
        let allProducts = [];

        async function loadProducts() {
            const res = await fetch(API);
            allProducts = await res.json();
            render(allProducts);
        }

        function render(data) {
            const list = document.getElementById('product-list');
            const isAdmin = !document.getElementById('admin-panel').classList.contains('hidden');
            list.innerHTML = '';
            
            data.forEach(p => {
                const hasOffer = p.oldPrice && parseInt(p.oldPrice) > parseInt(p.price);
                list.innerHTML += `
                    <div class="cyber-card p-4 rounded">
                        ${hasOffer ? `<div class="offer-tag">OFFER</div>` : ''}
                        <img src="${p.image}" class="w-full h-48 object-cover mb-4">
                        <h3 class="font-bold text-lg">${p.name}</h3>
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-xl text-indigo-400 font-bold">৳${p.price}</span>
                            ${hasOffer ? `<span class="text-gray-500 line-through text-sm">৳${p.oldPrice}</span>` : ''}
                        </div>
                        <button onclick="order('${p.name}', '${p.price}')" class="w-full py-2 neon-btn font-bold rounded mb-2">🛒 অর্ডার করুন</button>
                        ${isAdmin ? `<button onclick="deleteP('${p.id}')" class="w-full py-2 bg-red-800 text-white text-xs rounded">ডিলিট করুন 🗑️</button>` : ''}
                    </div>
                `;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            render(filtered);
        }

        function order(name, price) {
            const msg = `হ্যালো! আমি এই প্রোডাক্টটি অর্ডার করতে চাই: ${name}, দাম: ${price} টাকা। দয়া করে অর্ডার প্রসেসটি জানান।`;
            window.open(`https://wa.me/8801611341846?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function deleteP(id) {
            if(confirm('এটি ডিলিট করতে চান?')) {
                await fetch(`${API}/${id}`, {method: 'DELETE'});
                await loadProducts();
            }
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    price: document.getElementById('price').value,
                    oldPrice: document.getElementById('oldPrice').value,
                    image: document.getElementById('image').value
                })
            });
            await loadProducts();
            e.target.reset();
        };

        function openAdmin() {
            const p = prompt("অ্যাডমিন পাসওয়ার্ড:");
            if(p === "trend744") {
                document.getElementById('admin-panel').classList.remove('hidden');
                render(allProducts);
            } else alert("ভুল পাসওয়ার্ড!");
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            render(allProducts);
        }

        loadProducts();
    </script>
</body>
</html>
