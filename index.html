<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendPulse | Premium Lifestyle & Fashion Shop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #060b13;
            overflow-x: hidden;
        }
        
        /* 🌟 লিংকে ক্লিক করলেই স্ক্রিন জুড়ে আসার জন্য Welcome অ্যানিমেশন */
        #welcome-loader {
            position: fixed;
            inset: 0;
            background-color: #060b13;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }
        
        .glow-text-welcome {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px #6366f1, 0 0 35px #a855f7, 0 0 60px #6366f1;
            animation: pulseGlow 1.8s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.93); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* জ্বলজ্বলে নিয়ন গ্লো বাটন */
        .neon-glow-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6), 0 0 30px rgba(99, 102, 241, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .neon-glow-btn:hover {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.9), 0 0 50px rgba(99, 102, 241, 0.7);
            transform: translateY(-3px) scale(1.02);
        }

        /* মুভিং ব্যাকগ্রাউন্ড নেটওয়ার্ক */
        .bg-animate {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(rgba(99, 102, 241, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
            top: -50%;
            left: -50%;
            animation: bgScroll 40s linear infinite;
            z-index: 1;
        }
        @keyframes bgScroll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(5deg) translate(-50px, -50px); }
        }
    </style>
</head>
<body class="text-gray-100">

    <div id="welcome-loader">
        <h1 class="glow-text-welcome">WELCOME</h1>
        <p class="text-indigo-400 font-bold mt-4 tracking-widest uppercase text-sm">To TrendPulse Store</p>
        <div class="mt-6 w-20 h-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full overflow-hidden">
            <div class="w-full h-full bg-white rounded-full animate-ping"></div>
        </div>
    </div>

    <nav class="bg-gray-950/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800/80">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">TP</span>
                </div>
                <span class="text-2xl font-black text-white tracking-tight">Trend<span class="text-indigo-400">Pulse</span></span>
            </div>
            <a href="bags.html" class="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-600/30 transition">কালেকশন পেজ →</a>
        </div>
    </nav>

    <header class="relative bg-gradient-to-b from-gray-950 to-slate-900 py-32 px-6 overflow-hidden text-center flex items-center justify-center min-h-[80vh]">
        <div class="bg-animate"></div>
        
        <div class="max-w-4xl mx-auto relative z-10">
            <span class="inline-block bg-indigo-500/10 text-indigo-300 px-4 py-1 rounded-full text-xs font-bold mb-6 border border-indigo-500/20 uppercase tracking-widest">Next-Gen Lifestyle Store</span>
            <h1 class="text-4xl md:text-6xl font-black text-white mb-6 leading-tight">আপনার প্রতিদিনের লাইফস্টাইলকে <br>করুন আরও <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">ট্রেন্ডি ও আকর্ষণীয়</span></h1>
            <p class="text-gray-400 text-base md:text-lg mb-10 max-w-2xl mx-auto">টোট ব্যাগ থেকে শুরু করে ভবিষ্যৎ ফ্যাশনের সব লাইফস্টাইল প্রোডাক্টের ওয়ান-স্টপ প্রিমিয়াম হাব।</p>
            
            <div class="flex justify-center">
                <a href="bags.html" class="px-12 py-5 rounded-xl text-lg font-bold neon-glow-btn text-white text-center inline-block">কালেকশন দেখুন 🛍️</a>
            </div>
        </div>
    </header>

    <script>
        // Welcome স্ক্রিনটি ১.৫ সেকেন্ড পর স্মুথলি ভ্যানিশ করার স্ক্রিপ্ট
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('welcome-loader');
                if(loader) {
                    loader.style.opacity = '0';
                    loader.style.transform = 'scale(1.1)';
                    setTimeout(() => loader.style.display = 'none', 600);
                }
            }, 1500); // ১.৫ সেকেন্ড স্বাগতম লেখাটি থাকবে
        });
    </script>
</body>
</html>
